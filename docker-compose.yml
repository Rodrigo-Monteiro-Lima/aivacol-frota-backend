version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aivacol-sqlserver
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Aivacol123456!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "Aivacol123456!",
          "-Q",
          "SELECT 1",
          "-C",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aivacol-net

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./scripts:/usr/config
    networks:
      - aivacol-net
    command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'Aivacol123456!' -C -i /usr/config/init.sql
      "
  redis:
    image: redis:7-alpine
    container_name: aivacol-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aivacol-net

  app:
    container_name: aivacol-app
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_HOST: sqlserver
      DATABASE_HOST: sqlserver
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - aivacol-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aivacol-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aivacol-net

  aivacol-consumer:
    container_name: aivacol-consumer
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: always
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npx ts-node -r tsconfig-paths/register scripts/vehicle-events-consumer.ts
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - aivacol-net

volumes:
  sqlserver-data:
  redis-data:
  rabbitmq-data:

networks:
  aivacol-net:
    driver: bridge
